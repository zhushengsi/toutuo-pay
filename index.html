<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信付款 </title>
<style>
    /* 全局样式重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    body { 
        padding: 40px 20px; 
        text-align: center; 
        background: #fff; 
        color: #333;
    }

    .box { 
        max-width: 600px; 
        margin: 0 auto; 
    }

    h2 { 
        font-size: 2rem; 
        margin-bottom: 30px; 
        color: #000;
    }

    /* 通用方框样式 */
    .text-box {
        padding: 20px;
        border: 1px dashed #07C160; 
        background-color: #f9fdfa;
        border-radius: 12px;
        font-size: 1.1rem;
        word-break: break-all;
        text-align: center;
        margin-bottom: 20px;
        line-height: 1.5;
        color: #333;
        font-weight: bold;
    }

    /* 吉祥码展示区样式 */
    #luckyCodeArea {
        display: none; /* 默认隐藏，JS控制显示 */
        background-color: #e8f5e9;
        border-color: #2e7d32;
        margin-bottom: 30px;
    }
    
    #luckyCodeArea p.title {
        font-size: 0.9rem;
        color: #2e7d32;
        margin-bottom: 5px;
        font-weight: normal;
    }

    #luckyCodeArea .code-text {
        font-size: 1.3rem;
        color: #1b5e20;
        font-family: monospace;
        letter-spacing: 1px;
    }

    /* 🌟 新增：吉祥码专属样式（微信蓝色） */
    .lucky-code {
        color: #576b95; 
        font-weight: bold;
        cursor: pointer;
    }

    /* 按钮样式 */
    .btn {
        width: 100%;
        max-width: 320px;
        padding: 16px 0;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: transform 0.1s;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn:active { transform: scale(0.98); }

    /* 主操作按钮 */
    #mergeCopyBtn {
        background: #07C160;
        color: #fff;
        font-weight: bold;
        box-shadow: 0 4px 12px rgba(7, 193, 96, 0.4);
    }

    /* 辅助按钮 */
    #copyLinkBtn {
        background: #fff;
        color: #07C160;
        border: 1px solid #07C160;
        font-size: 1rem;
        padding: 12px 0;
    }

    .tips {
        margin-top: 25px;
        font-size: 0.95rem;
        color: #666;
        line-height: 1.6;
    }

    .warn-tip {
        margin-top: 10px;
        font-size: 0.85rem;
        color: #e67e22;
    }

    /* 兼容兜底DOM */
    #tempInput { opacity: 0; position: absolute; pointer-events: none; }
</style>
</head>
<body>

<div class="box">
    <h2>微信付款 1.14</h2>

    <!-- 1. 吉祥码展示区 -->
    <div id="luckyCodeArea" class="text-box">
        <p class="title">检测到您的专属吉祥码：</p>
        <div id="displayCode" class="code-text"></div>
    </div>
    
    <!-- 2. 支付链接展示区 -->
    <div class="text-box" id="payText">#付款:头陀度假村(经营_amtfljw_wydnnlq)/收款/001</div>
    
    <!-- 3. 核心操作按钮 -->
    <button id="mergeCopyBtn" class="btn">一键合并复制 (链接+吉祥码)</button>
    
    <!-- 备用按钮 -->
    <button id="copyLinkBtn" class="btn">仅复制支付链接</button>
    
    <!-- 4. 操作指引 -->
    <div class="tips">
        <p style="font-weight:bold; color:#333; margin-bottom:5px;">操作步骤：</p>
        <p>1. 点击上方绿色按钮，一次性复制所有内容。</p>
        <p>2. 打开微信，粘贴发送给任意好友或文件传输助手。</p>
        <p style="color:#d32f2f; margin-top:5px;">⚠️重要提醒：<br>粘贴后，请先长按复制第二行的<b>“无相布施者...”吉祥码</b>作为备注信息，<br><b>然后再点击第一行的链接进行支付。</b></p>
    </div>
    
    <p class="warn-tip">⚠️如自动复制失效，请长按上方方框内文字手动全选复制</p>
</div>

<!-- 兼容兜底输入框 -->
<input id="tempInput">

<script>
    // --- 变量定义 ---
    const payTextElement = document.getElementById('payText');
    const payLink = payTextElement.innerText.trim(); 
    
    const luckyCodeArea = document.getElementById('luckyCodeArea');
    const displayCode = document.getElementById('displayCode');
    const mergeBtn = document.getElementById('mergeCopyBtn');
    const linkBtn = document.getElementById('copyLinkBtn');
    const tempInput = document.getElementById('tempInput');

    // 🌟 全局变量，用于存储纯净版吉祥码，供复制事件拦截使用
    let currentPureCode = ''; 

    // --- 初始化：检查是否有吉祥码 ---
    window.onload = function() {
        const savedCode = localStorage.getItem('wuxiangLuckyCode');
        if (savedCode) {
            currentPureCode = savedCode; // 记录纯净码
            // 🌟 修改：用 span 包裹吉祥码，应用蓝色样式
            displayCode.innerHTML = `<span class="lucky-code">${savedCode}</span>`;
            luckyCodeArea.style.display = 'block'; 
            mergeBtn.innerText = "一键合并复制 (链接+吉祥码)"; 
        } else {
            luckyCodeArea.style.display = 'none';
            mergeBtn.innerText = "复制支付链接"; 
        }
    };

    // 🌟 核心魔法：全局监听复制事件，精准拦截并替换
    document.addEventListener('copy', function(e) {
        const selection = window.getSelection().toString();
        // 如果用户选中的正好是纯净的吉祥码，则替换为带#的版本
        if (selection === currentPureCode) {
            e.preventDefault(); // 阻止默认复制
            // 使用 execCommand 写入带#的文本，兼容性极佳
            document.execCommand('insertText', false, '#' + currentPureCode);
        }
    });

    // --- 核心功能：合并复制 ---
    mergeBtn.onclick = async function() {
        let contentToCopy = "";
        const savedCode = localStorage.getItem('wuxiangLuckyCode');

        if (savedCode) {
           // 【修改点】拼接顺序：电脑提示 -> 支付链接 -> 吉祥码 -> 主页链接 -> 操作提醒
           contentToCopy = "⚠️ 电脑用户请注意：微信电脑版无法完成支付，请务必在手机微信端打开！\n\n" + 
                payLink + "\n\n" + 
                savedCode + "\n\n" +
                "🔗 欢迎访问和推广无相布施助手主页: https://zhushengsi.github.io/.github.io\n\n" + 
                "====================\n" + 
                "🔴 【重要提醒】 🔴\n" + 
                "====================\n" + 
                "请在点击付款链接前，长按吉祥码文本至少3秒，选复制，再点击付款链接，在付款页面输入金额的下方点击“添加备注”，将吉祥码粘贴到备注里！\n" + 
                "(不粘贴到备注可能导致以后无法查询支付记录完成你的无相布施功德哦)\n" + 
                "====================";
        
        // 调用复制函数
        performCopy(contentToCopy, "✅ 已复制！\n请在微信粘贴后，先复制吉祥码用于填写备注信息（实现无相关键环节），再点链接支付。");
        
        } else {
            // 如果没有吉祥码，只复制链接
            performCopy(payLink, "✅ 支付链接已复制！");
        }
    };

    // --- 辅助功能：仅复制链接 ---
    linkBtn.onclick = function() {
        performCopy(payLink, "✅ 支付链接已复制！");
    };

    // --- 通用复制函数 ---
    function performCopy(text, successMsg) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                alert(successMsg);
            }).catch(err => {
                fallbackCopy(text, successMsg);
            });
        } else {
            fallbackCopy(text, successMsg);
        }
    }

    // --- 降级复制方案 ---
    function fallbackCopy(text, msg) {
        tempInput.value = text;
        tempInput.style.position = 'fixed'; 
        tempInput.style.left = '-9999px';
        document.body.appendChild(tempInput);
        tempInput.focus();
        tempInput.select();
        
        try {
            document.execCommand('copy');
            alert(msg);
        } catch (err) {
            alert("⚠️ 自动复制失败，请长按上方文字手动复制。");
        }
        
        document.body.removeChild(tempInput);
    }
</script>

</body>
</html>
