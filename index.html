<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头陀度假村经营收款</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{padding:40px 20px;text-align:center;background:#fff}
.box{max-width:600px;margin:0 auto}
.text{padding:20px;border:1px solid #ccc;border-radius:8px;margin:30px 0;font-size:18px;word-break:break-all}
button{padding:14px 32px;background:#07C160;color:#fff;border:none;border-radius:6px;font-size:17px;cursor:pointer}
</style>
</head>
<body>
<div class="box">
<h2>头陀度假村经营收款通道</h2>
<div class="text" id="payText">#付款:头陀度假村(经营_amtfljw_wydnnlq)/收款/001</div>
<button onclick="copyText()">一键复制收款口令</button>
<p style="margin-top:24px;color:#666">复制完成后，打开微信自动识别进行付款</p>
</div>
<script>
function copyText(){
  const text=document.getElementById("payText").innerText;
  navigator.clipboard.writeText(text);
  alert("收款口令复制成功，请打开微信");
}
</script>
</body>
</html>
