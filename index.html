<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信付款1.12</title>
<style>
    /* 全局样式重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    body { 
        padding: 40px 20px; 
        text-align: center; 
        background: #fff; 
        color: #333;
    }

    .box { 
        max-width: 600px; /* 限制最大宽度，防止在大屏上太宽 */
        margin: 0 auto; 
    }

    h2 { 
        font-size: 2rem; /* 使用相对单位 rem，比 px 更灵活 */
        margin-bottom: 30px; 
        color: #000;
    }

    /* 核心修改：链接显示区域样式 */
    .text-box {
        padding: 20px;
        border: 1px dashed #07C160; /* 改为虚线框，更像待复制区域 */
        background-color: #f9fdfa;
        border-radius: 12px;
        font-size: 1.2rem; /* 默认字体大小 */
        word-break: break-all; /* 强制长单词换行，防止撑破屏幕 */
        text-align: center;
        margin-bottom: 30px;
        line-height: 1.5;
        color: #333;
        font-weight: bold;
    }

    /* 按钮样式优化 */
    #copyBtn {
        width: 100%; /* 手机上按钮全宽更好点击 */
        max-width: 300px; /* 电脑上限制宽度 */
        padding: 18px 0;
        background: #07C160;
        color: #fff;
        border: none;
        border-radius: 50px; /* 圆角按钮更现代 */
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        transition: transform 0.1s;
    }

    #copyBtn:active {
        transform: scale(0.98); /* 点击时的按压效果 */
    }

    .tips {
        margin-top: 25px;
        font-size: 1rem;
        color: #666;
        line-height: 1.6;
    }

    .warn-tip {
        margin-top: 15px;
        font-size: 0.9rem;
        color: #e67e22; /* 橙色警告色 */
    }

    /* 隐藏输入框 */
    #tempInput { opacity: 0; position: absolute; pointer-events: none; }

    /* --- 手机端专属适配 (媒体查询) --- */
    @media screen and (max-width: 768px) {
        body { padding: 30px 15px; }
        
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        
        /* 重点：缩小手机端方框内的字体 */
        .text-box {
            font-size: 1rem; /* 手机上调整为 16px 左右，不再巨大 */
            padding: 15px;
        }

        #copyBtn {
            font-size: 1.1rem;
            padding: 15px 0;
        }
        
        .tips { font-size: 0.9rem; }
    }
</style>
</head>
<body>
    <!-- 【新增代码开始】用于显示从主页传来的吉祥码 -->
<div id="code-from-home" style="text-align: center; padding: 10px; background-color: #e8f5e9; border: 1px dashed #2e7d32; border-radius: 8px; margin-bottom: 20px; display: none;">
  <p style="margin: 0; font-weight: bold; color: #2e7d32;">检测到您的吉祥码：</p>
  <p id="display-code" style="margin: 10px 0 0 0; font-size: 1.2em; font-family: monospace;"></p>
  <button onclick="copyFromDisplay()" style="margin-top: 10px; padding: 5px 10px; font-size: 0.9em;">再次复制</button>
</div>
<!-- 【新增代码结束】 -->

<script>
  // 【新增代码开始】页面加载时检查并显示吉祥码
  window.onload = function() {
    const savedCode = localStorage.getItem('wuxiangLuckyCode');
    if (savedCode) {
      document.getElementById('display-code').innerText = savedCode;
      document.getElementById('code-from-home').style.display = 'block';
    }
  }

  // 提供一个按钮，方便用户再次复制
  function copyFromDisplay() {
    const code = document.getElementById('display-code').innerText;
    navigator.clipboard.writeText(code).then(() => {
      alert('吉祥码已复制！');
    });
  }
  // 【新增代码结束】
</script>
<div class="box">
    <h2>微信付款 1.12</h2>
    
    <!-- 修复了这里的语法，确保文字能显示出来 -->
    <div class="text-box" id="payText">#付款:头陀度假村(经营_amtfljw_wydnnlq)/收款/001</div>
    
    <button id="copyBtn">一键复制微信收款通道</button>
    
    <p class="tips">复制完成，打开微信<br>粘贴到任意聊天窗口，点击进入付款</p>
    <p class="warn-tip">⚠️一键复制失效时：长按上方方框内文字，手动选中复制</p>
</div>

<!-- 兼容兜底DOM -->
<input id="tempInput">

<script>
// 获取显示的文本内容
const payTextElement = document.getElementById('payText');
const textContent = payTextElement.innerText; 

const btn = document.getElementById('copyBtn');
const tempInput = document.getElementById('tempInput');

btn.onclick = async function(){
    try{
        // 优先使用现代剪贴板API
        await navigator.clipboard.writeText(textContent);
        alert("✅复制成功！\n请前往微信粘贴发送");
    }catch(err){
        // 权限不足，启用兜底复制方案
        tempInput.value = textContent;
        tempInput.select();
        document.execCommand('copy');
        alert("⚠️浏览器限制，已尝试自动复制。\n如失败，请长按上方方框文字手动复制");
    }
}
</script>
</body>
</html>
